name: Web — lint, typecheck & build

# Enforce the design-token vocabulary (no raw hex / font-size / box-shadow
# outside index.css), guard the anti-drift checks (observationExtract, stage
# ids, catalog integrity), and run TypeScript, ESLint, and a production build.
# The observationExtract check reads Questionnaires from FHIR-Resources/ at the
# repo root, so this also triggers on FHIR-Resources/** — path drift there
# (e.g. the PR #107 flattening) would otherwise slip past CI. The stage-id and
# catalog checks validate against ig/input/fsh/, so ig/** triggers too. Runs on
# every push to main and matching PRs.

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - 'FHIR-Resources/**'
      - 'ig/**'
      - '.github/workflows/web-lint.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'FHIR-Resources/**'
      - 'ig/**'
      - '.github/workflows/web-lint.yml'
  workflow_dispatch:

jobs:
  lint-css:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Lint CSS
        run: npm run lint:css

      - name: Check observationExtract contract
        run: npm run check:extract

      # Reads the canonical stage list straight from ig/input/fsh/ — no
      # copy-fhir needed, so it can run in this fast job.
      - name: Check population stage ids
        run: npm run check:stages

  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # Generates web/src/data/fhir/*.json and care-plan-profiles.generated.ts,
      # which src/data/catalog/stages.ts and src/lib/carePlanMappers/shared.ts
      # import. Must run before tsc and build.
      - name: Copy FHIR resources
        run: npm run copy-fhir

      # Needs the generated ActivityDefinition/PlanDefinition/CodeSystem JSON,
      # so it runs after copy-fhir.
      - name: Check catalog integrity
        run: npm run check:catalog

      - name: Typecheck
        run: npx tsc -b

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
