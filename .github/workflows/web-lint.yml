name: Web — lint, typecheck & build

# Enforce the design-token vocabulary (no raw hex / font-size / box-shadow
# outside index.css), guard the observationExtract anti-drift check, and run
# TypeScript, ESLint, and a production build. The observationExtract check reads
# Questionnaires from FHIR-Resources/ at the repo root, so this also triggers on
# FHIR-Resources/** — path drift there (e.g. the PR #107 flattening) would
# otherwise slip past CI. Runs on every push to main and matching PRs.

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - 'FHIR-Resources/**'
      - '.github/workflows/web-lint.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'FHIR-Resources/**'
      - '.github/workflows/web-lint.yml'
  workflow_dispatch:

jobs:
  lint-css:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Lint CSS
        run: npm run lint:css

      - name: Check observationExtract contract
        run: npm run check:extract

  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # Generates web/src/data/fhir/*.json and care-plan-profiles.generated.ts,
      # which src/data/catalog/stages.ts and src/lib/carePlanMappers/shared.ts
      # import. Must run before tsc and build.
      - name: Copy FHIR resources
        run: npm run copy-fhir

      - name: Typecheck
        run: npx tsc -b

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
