name: Deploy to Cloudflare

# Parallel hosting alongside GitHub Pages (.github/workflows/deploy.yml) during
# the migration to Cloudflare. Deploys ONE Cloudflare Worker (services/cds-hooks)
# that serves BOTH the adoption-guide SPA (Static Assets, base `/`) and the CDS
# Hooks API at /cds-services/*.
#
# The rendered HL7 IG is NOT built here — it stays on the canonical GitHub Pages
# site, and the Worker redirects /ig/* there (src/index.ts). When Cloudflare
# becomes canonical, render the IG into web-dist/ig and drop the redirect.
#
# Requires two repo secrets: CLOUDFLARE_API_TOKEN (scoped to "Workers Scripts:
# Edit" + "Workers Static Assets") and CLOUDFLARE_ACCOUNT_ID. The Worker is
# created automatically on first deploy — no pre-provisioning needed.

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm --prefix ./web ci
          npm --prefix ./services/cds-hooks ci

      # Builds the SPA (base `/`, the vite.config default — no VITE_BASE here,
      # unlike GitHub Pages), stages it into services/cds-hooks/web-dist, then
      # bundles the Worker. prebuild runs copy-fhir (SUSHI is a local dep), so
      # the build is self-contained.
      - name: Build combined Worker (SPA + CDS Hooks)
        working-directory: ./services/cds-hooks
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./services/cds-hooks
          command: deploy
