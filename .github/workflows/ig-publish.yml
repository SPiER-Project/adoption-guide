name: IG Publisher (on-demand render)

# Full HL7 IG Publisher build: runs SUSHI, renders the narrative pages with
# Jekyll, checks internal links, and produces the hostable site + a QA report.
#
# This is HEAVY (downloads the publisher jar + hundreds of MB of FHIR packages,
# plus Jekyll) so it deliberately does NOT run on normal PRs — the lightweight
# `ig.yml` (SUSHI only) covers those. Trigger this one ON DEMAND from the
# Actions tab (Run workflow), or it self-tests automatically when this workflow
# file itself changes.
#
# The rendered site + qa.html are uploaded as an artifact so you can preview the
# IG and inspect any broken links / QA findings.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/ig-publish.yml'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Jekyll
        run: gem install jekyll

      - name: Install SUSHI
        run: npm install -g fsh-sushi

      - name: Download IG Publisher
        run: curl -sL -o publisher.jar https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar

      - name: Run IG Publisher
        working-directory: ./ig
        run: java -jar ../publisher.jar -ig . | tee publisher.log

      - name: QA summary report
        if: always()
        working-directory: ./ig
        run: |
          qa=output/qa.txt
          if [ ! -f "$qa" ]; then
            echo "::error::no output/qa.txt produced — the IG Publisher did not complete"
            exit 1
          fi
          # qa.txt header line format (IG Publisher 2.x): "err = N, warn = M, info = K"
          # Broken-link total is reported in the publisher log: "Broken Links: N"
          errs=$(grep -oiE 'err *= *[0-9]+' "$qa" | head -1 | grep -oE '[0-9]+')
          warns=$(grep -oiE 'warn *= *[0-9]+' "$qa" | head -1 | grep -oE '[0-9]+')
          broken=$(grep -oiE 'Broken Links: *[0-9]+' publisher.log | tail -1 | grep -oE '[0-9]+')
          echo "QA → errors=${errs:-?} warnings=${warns:-?} brokenLinks=${broken:-?}"
          {
            echo "### IG Publisher QA"
            echo ""
            echo "| Errors | Warnings | Broken links |"
            echo "|---|---|---|"
            echo "| ${errs:-?} | ${warns:-?} | ${broken:-?} |"
            echo ""
            echo "Full report (\`qa.html\`) and the rendered site are in the **ig-site** artifact."
          } >> "$GITHUB_STEP_SUMMARY"
          # Gate: fail on any IG Publisher error or broken link. The baseline is
          # 0 / 0 as of Phase 2a (#84); this guards against regressions.
          if { [ -n "$errs" ] && [ "$errs" != "0" ]; } || { [ -n "$broken" ] && [ "$broken" != "0" ]; }; then
            echo "::error::IG Publisher reported ${errs:-?} error(s) and ${broken:-?} broken link(s) — see the qa.html artifact"
            exit 1
          fi

      - name: Upload rendered site + QA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ig-site
          path: |
            ig/output/qa.html
            ig/output/qa.txt
            ig/output/*.html
            ig/publisher.log
          if-no-files-found: warn
          retention-days: 14
